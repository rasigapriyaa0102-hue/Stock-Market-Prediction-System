<!DOCTYPE html>
<html>
<head>
<title>Stock Forecast</title>
</head>

<body>

<h1>Stock Forecast Result</h1>

<h2>{{stock}} - Next 7 Day Forecast</h2>

<table border="1" cellpadding="10">

<tr>
<th>Day</th>
<th>Predicted Price</th>
</tr>

{% for i in range(forecast|length) %}

<tr>
<td>Day {{i+1}}</td>
<td>{{forecast[i]}}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/">Back</a>

</body>

</html>
